<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Ironclad Access Supply</title>
<style>
  :root {
    --ink: #1C2024;
    --steel: #14181D;
    --steel-light: #4C5560;
    --paper: #FFFFFF;
    --paper-dim: #EEF1F4;
    --brass: #1D5AA8;
    --brass-bright: #2E76CC;
    --off-white: #FFFFFF;
    --line: rgba(16,20,24,0.14);
    --font-display: 'Bebas Neue', 'Arial Narrow', sans-serif;
    --font-body: 'IBM Plex Sans', 'Segoe UI', sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; } body { background: var(--paper); color: var(--ink); font-family: var(--font-body); line-height: 1.5; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }

  header.main {
    background: var(--ink); color: #FFFFFF; padding: 18px 24px 16px; border-bottom: 3px solid var(--brass);
  }
  .header-inner { max-width: 1180px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .nameplate { display: inline-flex; align-items: center; gap: 12px; border: 2px solid var(--brass); padding: 9px 22px; }
  .brand-icon { width: 26px; height: 26px; flex-shrink: 0; color: var(--brass-bright); }
  .brand-mark { font-family: var(--font-display); font-weight: 700; font-size: 1.9rem; letter-spacing: 0.03em; text-transform: uppercase; white-space: nowrap; }
  .brand-mark .accent { color: var(--brass-bright); }
  nav.main-nav {
    display: flex; justify-content: center; gap: 22px; width: 100%;
    font-family: var(--font-display); font-weight: 600; font-size: 0.88rem;
    letter-spacing: 0.03em; text-transform: uppercase; flex-wrap: wrap;
  }
  nav.main-nav a { opacity: 0.96; border-bottom: 2px solid transparent; padding-bottom: 2px; }
  nav.main-nav a:hover { border-bottom-color: var(--brass-bright); }

  .demo-banner {
    background: var(--paper-dim); border-bottom: 1px solid var(--line); text-align: center;
    padding: 8px 20px; font-family: var(--font-mono); font-size: 0.72rem; color: var(--steel-light);
  }

  main.wrap { max-width: 980px; margin: 0 auto; padding: 34px 24px 60px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 40px; }

  h1 {
    font-family: var(--font-display); font-weight: 600; font-size: 2rem; text-transform: uppercase;
    letter-spacing: 0.02em; margin-bottom: 20px; grid-column: 1 / -1; border-bottom: 2px solid var(--brass); padding-bottom: 12px; text-align: center;
  }

  .form-section { margin-bottom: 26px; }
  .form-section h2 {
    font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--steel-light); margin-bottom: 12px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  label { display: block; font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--steel-light); margin-bottom: 5px; }
  input, select {
    width: 100%; border: 1px solid var(--line); background: var(--paper); padding: 10px 12px;
    font-family: var(--font-body); font-size: 0.9rem; color: var(--ink); outline: none;
  }
  input:focus, select:focus { border-color: var(--brass); }

  .order-summary {
    border: 2px solid var(--ink); padding: 20px 22px; align-self: start; position: sticky; top: 20px;
  }
  .order-summary h2 {
    font-family: var(--font-display); font-weight: 600; font-size: 1.3rem; text-transform: uppercase;
    letter-spacing: 0.03em; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  .order-line { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; }
  .order-line .name { color: var(--steel-light); }
  .order-total {
    display: flex; justify-content: space-between; font-family: var(--font-display); font-weight: 700;
    font-size: 1.15rem; text-transform: uppercase; border-top: 2px solid var(--brass); padding-top: 12px; margin-top: 12px;
  }

  .btn {
    display: block; width: 100%; text-align: center; margin-top: 18px;
    background: var(--brass); color: #FFFFFF; border: none; padding: 14px;
    font-family: var(--font-display); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
  }
  .btn:hover { background: var(--brass-bright); }
  .btn:disabled { background: var(--steel-light); cursor: not-allowed; }

  .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--steel-light); }
  .empty-state a.btn { display: inline-block; margin-top: 16px; }

  footer.site-footer {
    border-top: 1px solid var(--line); padding: 20px 24px; text-align: center;
    font-family: var(--font-mono); font-size: 0.68rem; color: var(--steel-light);
  }

  @media (max-width: 720px) {
    main.wrap { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 620px) {
    .nameplate { padding: 7px 14px; gap: 8px; max-width: 92vw; }
    .brand-icon { width: 20px; height: 20px; }
    .brand-mark { font-size: 1.3rem; letter-spacing: 0.01em; white-space: normal; text-align: center; line-height: 1.25; }
  }
</style>
</head>
<body>

  <header class="main">
    <div class="header-inner">
      <div class="brand-block" style="display:flex;align-items:center;justify-content:center;width:100%;">
        <div class="nameplate">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="11" width="16" height="10" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <path d="M7.5 11V7.5a4.5 4.5 0 0 1 9 0V11" stroke="currentColor" stroke-width="2" fill="none"/>
            <circle cx="12" cy="16" r="1.6" fill="currentColor"/>
          </svg>
          <div class="brand-mark">IRON<span class="accent">CLAD</span> ACCESS SUPPLY</div>
        </div>
      </div>
      <nav class="main-nav">
        <a href="../">Home</a>
        <a href="../cart/">Back to Cart</a>
      </nav>
    </div>
  </header>

  <div class="demo-banner">This checkout is a design preview — no payment is processed and no order is placed.</div>

  <main class="wrap">
    <h1>Checkout</h1>
    <div id="checkoutContent" style="display:contents;"></div>
  </main>

  <footer class="site-footer">© 2026 IRONCLAD ACCESS SUPPLY — LICENSED LOCKSMITH-OWNED · COMMERCIAL DOOR HARDWARE &middot; <a href="../returns-warranty/" style="color:inherit;">Returns &amp; Warranty</a></footer>

<script>
  const CART_KEY = 'tls_cart';

  const PRODUCT_CATALOG = {
    levers:   { name: 'Arrow GL81 Grade 1 Lever',                brand: 'Arrow', price: 267.83 },
    closers:  { name: 'Grade 1 Adjustable Closer, Size 1-6',     brand: 'LSDA',  price: 190.11 },
    maglocks: { name: '600 lb Surface Mount Mag Lock',           brand: 'HES',   price: 130.69 },
    panic:    { name: 'Arrow S1250 Fire-Rated Rim Exit Device',  brand: 'Arrow', price: 479.00 },
  };

  function getCart() {
    try { return JSON.parse(localStorage.getItem(CART_KEY)) || {}; }
    catch (e) { return {}; }
  }

  function render() {
    const cart = getCart();
    const ids = Object.keys(cart).filter(id => PRODUCT_CATALOG[id] && cart[id] > 0);
    const container = document.getElementById('checkoutContent');

    if (ids.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <p>There's nothing in your cart to check out.</p>
          <a class="btn" href="../">Browse Hardware</a>
        </div>`;
      return;
    }

    let subtotal = 0;
    let orderLines = '';
    ids.forEach(id => {
      const p = PRODUCT_CATALOG[id];
      const qty = cart[id];
      const lineTotal = p.price * qty;
      subtotal += lineTotal;
      orderLines += `<div class="order-line"><span class="name">${p.name} &times; ${qty}</span><span>$${lineTotal.toFixed(2)}</span></div>`;
    });

    container.innerHTML = `
      <div>
        <div class="form-section">
          <h2>Contact</h2>
          <div class="form-row full">
            <div><label>Email Address</label><input type="email" placeholder="you@company.com"></div>
          </div>
        </div>
        <div class="form-section">
          <h2>Shipping Address</h2>
          <div class="form-row">
            <div><label>First Name</label><input type="text"></div>
            <div><label>Last Name</label><input type="text"></div>
          </div>
          <div class="form-row full">
            <div><label>Company (optional)</label><input type="text"></div>
          </div>
          <div class="form-row full">
            <div><label>Street Address</label><input type="text"></div>
          </div>
          <div class="form-row">
            <div><label>City</label><input type="text"></div>
            <div><label>State</label><input type="text"></div>
          </div>
          <div class="form-row">
            <div><label>ZIP Code</label><input type="text"></div>
            <div><label>Phone</label><input type="tel"></div>
          </div>
        </div>
        <div class="form-section">
          <h2>Payment</h2>
          <div class="form-row full">
            <div><label>Card Number</label><input type="text" placeholder="Payment integration required"></div>
          </div>
          <div class="form-row">
            <div><label>Expiration</label><input type="text" placeholder="MM / YY"></div>
            <div><label>CVC</label><input type="text"></div>
          </div>
        </div>
      </div>
      <div class="order-summary">
        <h2>Order Summary</h2>
        ${orderLines}
        <div class="order-total"><span>Total</span><span>$${subtotal.toFixed(2)}</span></div>
        <button class="btn" disabled title="Connect a payment processor to enable orders">Place Order</button>
      </div>`;
  }

  render();
</script>

</body>
</html>
