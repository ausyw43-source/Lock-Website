<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — Ironclad Access Supply</title>
<style>
  :root {
    --ink: #1C2024;
    --steel: #14181D;
    --steel-light: #4C5560;
    --paper: #FFFFFF;
    --paper-dim: #EEF1F4;
    --brass: #1D5AA8;
    --brass-bright: #2E76CC;
    --blue: #0F3A66;
    --off-white: #FFFFFF;
    --line: rgba(16,20,24,0.14);
    --line-light: rgba(255,255,255,0.16);
    --font-display: 'Bebas Neue', 'Arial Narrow', sans-serif;
    --font-body: 'IBM Plex Sans', 'Segoe UI', sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { overflow-x: hidden; } body { background: var(--paper); color: var(--ink); font-family: var(--font-body); line-height: 1.5; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }

  header.main {
    background: var(--ink);
    color: #FFFFFF;
    padding: 18px 24px 16px;
    border-bottom: 3px solid var(--brass);
  }
  .header-inner { max-width: 1180px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .brand-block { display: flex; align-items: center; justify-content: center; width: 100%; }
  .nameplate { display: inline-flex; align-items: center; gap: 12px; border: 2px solid var(--brass); padding: 9px 22px; }
  .brand-icon { width: 26px; height: 26px; flex-shrink: 0; color: var(--brass-bright); }
  .brand-mark { font-family: var(--font-display); font-weight: 700; font-size: 1.9rem; letter-spacing: 0.03em; text-transform: uppercase; white-space: nowrap; }
  .brand-mark .accent { color: var(--brass-bright); }
  nav.main-nav {
    display: flex; justify-content: center; gap: 22px; width: 100%;
    font-family: var(--font-display); font-weight: 600; font-size: 0.88rem;
    letter-spacing: 0.03em; text-transform: uppercase; flex-wrap: wrap;
  }
  nav.main-nav a { opacity: 0.96; border-bottom: 2px solid transparent; padding-bottom: 2px; transition: all 0.15s; }
  nav.main-nav a:hover, nav.main-nav a.current { opacity: 1; border-bottom-color: var(--brass-bright); }
  .cart-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px; background: var(--brass-bright); color: #FFFFFF;
    border-radius: 9px; font-family: var(--font-mono); font-size: 0.68rem; font-weight: 600; margin-left: 2px;
  }

  main.wrap { max-width: 900px; margin: 0 auto; padding: 34px 24px 60px; }

  h1 {
    font-family: var(--font-display); font-weight: 600; font-size: 2.1rem;
    text-transform: uppercase; letter-spacing: 0.02em; border-bottom: 2px solid var(--brass);
    padding-bottom: 12px; margin-bottom: 24px; text-align: center;
  }

  .cart-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
  .cart-table thead th {
    text-align: left; font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--steel-light); padding: 0 10px 10px; border-bottom: 2px solid var(--ink);
  }
  .cart-table tbody td { padding: 16px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .item-name { font-family: var(--font-display); font-weight: 600; font-size: 1.25rem; text-transform: uppercase; }
  .item-brand { font-family: var(--font-mono); font-size: 0.72rem; color: var(--steel-light); margin-top: 2px; }
  .qty-control { display: flex; align-items: center; border: 2px solid var(--ink); width: fit-content; }
  .qty-control button {
    background: var(--paper); border: none; width: 28px; height: 30px; cursor: pointer;
    font-family: var(--font-display); font-weight: 700; font-size: 1rem; color: var(--ink);
  }
  .qty-control button:hover { background: var(--brass); color: #FFFFFF; }
  .qty-control input {
    width: 40px; border: none; border-left: 2px solid var(--ink); border-right: 2px solid var(--ink);
    text-align: center; font-family: var(--font-mono); font-size: 0.9rem; padding: 5px 0; outline: none;
  }
  .line-total { font-family: var(--font-mono); font-weight: 600; text-align: right; white-space: nowrap; }
  .remove-btn {
    background: transparent; border: none; color: var(--steel-light); cursor: pointer;
    font-family: var(--font-mono); font-size: 0.9rem; padding: 4px 8px;
  }
  .remove-btn:hover { color: #8C2F2A; }

  .empty-cart { text-align: center; padding: 60px 20px; color: var(--steel-light); }
  .empty-cart p { margin-bottom: 20px; font-size: 0.95rem; }
  .empty-cart a.btn { display: inline-block; }

  .summary {
    border: 2px solid var(--ink); padding: 20px 24px; max-width: 380px; margin-left: auto;
  }
  .summary-row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 0.85rem; margin-bottom: 8px; }
  .summary-row.total {
    font-family: var(--font-display); font-weight: 700; font-size: 1.2rem; text-transform: uppercase;
    border-top: 2px solid var(--brass); padding-top: 12px; margin-top: 12px;
  }

  .btn {
    display: block; width: 100%; text-align: center; margin-top: 18px;
    background: var(--brass); color: #FFFFFF; border: none; padding: 14px;
    font-family: var(--font-display); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
  }
  .btn:hover { background: var(--brass-bright); }
  .continue-link {
    display: block; text-align: center; margin-top: 14px; font-family: var(--font-mono);
    font-size: 0.78rem; color: var(--steel-light); text-decoration: underline;
  }

  footer.site-footer {
    border-top: 1px solid var(--line); padding: 20px 24px; text-align: center;
    font-family: var(--font-mono); font-size: 0.68rem; color: var(--steel-light);
  }

  @media (max-width: 640px) {
    .cart-table thead { display: none; }
    .cart-table tbody tr { display: flex; flex-wrap: wrap; padding: 14px 0; }
    .cart-table tbody td { border: none; padding: 4px 10px; }
    .summary { max-width: 100%; }
  }
  @media (max-width: 620px) {
    .nameplate { padding: 7px 14px; gap: 8px; max-width: 92vw; }
    .brand-icon { width: 20px; height: 20px; }
    .brand-mark { font-size: 1.3rem; letter-spacing: 0.01em; white-space: normal; text-align: center; line-height: 1.25; }
  }
</style>
</head>
<body>

    <div class="header-inner">

        <div class="nameplate">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="11" width="16" height="10" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <path d="M7.5 11V7.5a4.5 4.5 0 0 1 9 0V11" stroke="currentColor" stroke-width="2" fill="none"/>
            <circle cx="12" cy="16" r="1.6" fill="currentColor"/>
          </svg>
          <div class="brand-mark">IRON<span class="accent">CLAD</span> ACCESS SUPPLY</div>
        </div>
      </div>
      <nav class="main-nav">
        <a href="../">Home</a>
        <a href="../levers/">Levers &amp; Locksets</a>
        <a href="../closers/">Door Closers</a>
        <a href="../maglocks/">Magnetic Locks</a>
        <a href="../panic/">Exit Devices</a>
        <a href="../cart/" class="current">Cart <span class="cart-badge" id="cartBadge">0</span></a>
        <a href="../login/">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <h1>Your Cart</h1>

    <div id="cartContent"></div>

    'gms-standard-duty-concealed-overhead-closer': { name: 'GMS Standard Duty Concealed Overhead Closer', brand: 'GMS', price: 248.52 },
    'gms-fire-rated-concealed-overhead-closer': { name: 'GMS Fire-Rated Concealed Overhead Closer', brand: 'GMS', price: 199.91 },
    'gms-ada-compliant-floor-spring-closer': { name: 'GMS ADA Compliant Floor Spring Closer', brand: 'GMS', price: 230.3 },
    'gms-heavy-duty-parallel-arm-closer': { name: 'GMS Heavy Duty Parallel Arm Closer', brand: 'GMS', price: 181.69 },
    'lsda-standard-duty-surface-mount-closer': { name: 'LSDA Standard Duty Surface Mount Closer', brand: 'LSDA', price: 180.0 },
    'lsda-fire-rated-surface-mount-closer': { name: 'LSDA Fire-Rated Surface Mount Closer', brand: 'LSDA', price: 211.39 },
    'lsda-ada-compliant-concealed-overhead-closer': { name: 'LSDA ADA Compliant Concealed Overhead Closer', brand: 'LSDA', price: 242.78 },
    'lsda-heavy-duty-floor-spring-closer': { name: 'LSDA Heavy Duty Floor Spring Closer', brand: 'LSDA', price: 193.17 },
    'lsda-standard-duty-parallel-arm-closer': { name: 'LSDA Standard Duty Parallel Arm Closer', brand: 'LSDA', price: 224.56 },
    'lsda-fire-rated-parallel-arm-closer': { name: 'LSDA Fire-Rated Parallel Arm Closer', brand: 'LSDA', price: 255.95 },
    'lsda-ada-compliant-top-jamb-closer': { name: 'LSDA ADA Compliant Top Jamb Closer', brand: 'LSDA', price: 206.34 },
    'lsda-non-fire-rated-rim-exit-device-less-trim': { name: 'LSDA Non-Fire-Rated Rim Exit Device, Less Trim', brand: 'LSDA', price: 457.13 },
    'lsda-fire-rated-rim-exit-device-with-lever-trim': { name: 'LSDA Fire-Rated Rim Exit Device, With Lever Trim', brand: 'LSDA', price: 428.52 },
    'lsda-non-fire-rated-mortise-exit-device-less-trim': { name: 'LSDA Non-Fire-Rated Mortise Exit Device, Less Trim', brand: 'LSDA', price: 539.91 },
  };

  function getCart() {
    try { return JSON.parse(localStorage.getItem(CART_KEY)) || {}; }
    catch (e) { return {}; }
  }

  function saveCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
    updateCartBadge();
  }

  function updateCartBadge() {
    const cart = getCart();
    const count = Object.values(cart).reduce((sum, qty) => sum + qty, 0);
    const badge = document.getElementById('cartBadge');
    if (badge) badge.textContent = count;
  }

  function setQty(productId, qty) {
    const cart = getCart();
    qty = Math.max(0, Math.floor(qty) || 0);
    if (qty === 0) {
      delete cart[productId];
    } else {
      cart[productId] = qty;
    }
    saveCart(cart);
    render();
  }

  function changeQty(productId, delta) {
    const cart = getCart();
    setQty(productId, (cart[productId] || 0) + delta);
  }

  function removeItem(productId) {
    const cart = getCart();
    delete cart[productId];
    saveCart(cart);
    render();
  }

  function render() {
    const cart = getCart();
    const ids = Object.keys(cart).filter(id => PRODUCT_CATALOG[id] && cart[id] > 0);
    const container = document.getElementById('cartContent');

    if (ids.length === 0) {
      container.innerHTML = `
        <div class="empty-cart">
          <p>Your cart is empty.</p>
          <a class="btn" href="../" style="display:inline-block;">Browse Hardware</a>
        </div>`;
      return;
    }

    let rows = '';
    let subtotal = 0;
    ids.forEach(id => {
      const product = PRODUCT_CATALOG[id];
      const qty = cart[id];
      const lineTotal = product.price * qty;
      subtotal += lineTotal;
      rows += `
        <tr>
          <td>
            <div class="item-name">${product.name}</div>
            <div class="item-brand">${product.brand}</div>
          </td>
          <td>$${product.price.toFixed(2)}</td>
          <td>
            <div class="qty-control">
              <button onclick="changeQty('${id}', -1)">&minus;</button>
              <input type="number" min="0" value="${qty}" onchange="setQty('${id}', this.value)">
              <button onclick="changeQty('${id}', 1)">+</button>
            </div>
          </td>
          <td class="line-total">$${lineTotal.toFixed(2)}</td>
          <td><button class="remove-btn" onclick="removeItem('${id}')" title="Remove">&#10005;</button></td>
        </tr>`;
    });

    container.innerHTML = `
      <table class="cart-table">
        <thead>
          <tr><th>Item</th><th>Price</th><th>Qty</th><th style="text-align:right;">Total</th><th></th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="summary">
        <div class="summary-row"><span>Items</span><span>${ids.reduce((s, id) => s + cart[id], 0)}</span></div>
        <div class="summary-row total"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
        <button class="btn" onclick="window.location.href='../checkout/'">Proceed to Checkout</button>
        <a class="continue-link" href="../">&larr; Continue Shopping</a>
      </div>`;
  }

  updateCartBadge();
  render();
</script>

</body>
</html>
